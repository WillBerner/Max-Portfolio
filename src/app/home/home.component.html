<section class="hero">
  

  <div class="about-bg">
    <p>
      About — <a href="https://www.linkedin.com/in/maxwell-berner/" target="_blank" rel="noopener noreferrer">I’m Max</a>, an architect and interior designer focused on quiet,
      material-driven spaces that feel lived-in and considered. This site
      showcases selected projects and approaches to design.
    </p>
  </div>
  
  <div class="hero-spacer" aria-hidden="true"></div>

  <section class="samples">
    <div class="list">
      <article class="card" *ngFor="let p of sampleProjects">
        <img [src]="p.image" [alt]="p.title" />
        <div class="card-body">
          <h3>{{ p.title }}</h3>
          <p class="caption">{{ p.caption }}</p>
        </div>
      </article>
    </div>
  </section>

  <a class="view-all" routerLink="/projects">View All Projects</a>
</section>
