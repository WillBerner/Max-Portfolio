<section class="hero">
  

  <div class="about-bg">
    <p>
      About — <a href="https://www.linkedin.com/in/maxwell-berner/" target="_blank" rel="noopener noreferrer">I’m Max</a>, an architect and interior designer focused on quiet,
      material-driven spaces that feel lived-in and considered. This site
      showcases selected projects and approaches to design.
    </p>
  </div>
  
  <div class="hero-spacer" aria-hidden="true"></div>

  <section class="samples">
    <div class="list">
      <article class="card" *ngFor="let p of sampleProjects; let i = index" (click)="openSlideshow(i)">
        <img [src]="p.image" [alt]="p.title" />
        <div class="card-body">
          <h3>{{ p.title }}</h3>
          <p class="caption">{{ p.caption }}</p>
        </div>
      </article>
    </div>
  </section>

  <a class="view-all" routerLink="/projects">View All Projects</a>
  
  <!-- Slideshow / Lightbox overlay -->
  <div class="slideshow-overlay" *ngIf="slideshowOpen" (mousemove)="onOverlayMouseMove()" (click)="closeSlideshow()" (touchstart)="$event.preventDefault()">
    <div class="slideshow-inner" (click)="$event.stopPropagation()" (touchstart)="$event.stopPropagation(); onTouchStart($event)" (touchmove)="$event.stopPropagation(); onTouchMove($event)" (touchend)="$event.stopPropagation(); onTouchEnd($event)">
      <img class="slideshow-image" [src]="sampleProjects[currentIndex].image" [alt]="sampleProjects[currentIndex].title" />
      <button class="ctrl btn-close" *ngIf="showControls" (click)="closeSlideshow()">✕</button>
      <button class="ctrl btn-prev" *ngIf="showControls" (click)="prev(); $event.stopPropagation()">◀</button>
      <button class="ctrl btn-next" *ngIf="showControls" (click)="next(); $event.stopPropagation()">▶</button>
    </div>
  </div>
</section>
