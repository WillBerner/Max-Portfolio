<section class="projects">
  <div class="projects-header">
    <h1>Projects</h1>
  </div>

  <div class="grid tiles">
    <a class="tile" *ngFor="let p of projects" [routerLink]="['/']" [queryParams]="{ slideId: p.id }">
      <img [src]="p.image" [alt]="p.title" />
    </a>
  </div>

  <a class="back-arrow" routerLink="/">←</a>
</section>
